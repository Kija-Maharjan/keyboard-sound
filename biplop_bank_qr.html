<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biplop Maharjan — Bank QR</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d0d;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Montserrat', sans-serif;
    padding: 24px;
  }

  .card {
    background: #111010;
    border: 1px solid rgba(184,150,12,0.2);
    width: 340px;
    padding: 36px 28px 32px;
    position: relative;
    box-shadow: 0 0 80px rgba(184,150,12,0.07), 0 24px 60px rgba(0,0,0,0.6);
  }

  /* corner brackets — like image 2 */
  .card::before, .card::after,
  .card .corner-br, .card .corner-bl {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-color: #b8960c;
    border-style: solid;
  }
  .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .card::after  { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .card .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
  .card .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }

  /* noise grain */
  .card::before { z-index: 0; }
  .noise {
    position: absolute; inset: 0; pointer-events: none; z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.35;
  }

  .inner { position: relative; z-index: 2; }

  /* top tag */
  .tag {
    font-size: 7px; letter-spacing: 4px; text-transform: uppercase;
    color: #b8960c; margin-bottom: 18px; font-weight: 500;
    opacity: 0.8;
  }

  /* name */
  .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px; font-weight: 300; color: #f5f0ea;
    letter-spacing: -0.3px; line-height: 1; margin-bottom: 3px;
  }
  .name em { font-style: italic; color: #b8960c; }

  /* bank line */
  .bank-line {
    font-size: 8px; letter-spacing: 2.5px; text-transform: uppercase;
    color: rgba(200,196,188,0.45); margin-bottom: 28px; font-weight: 400;
  }

  /* divider */
  .divider {
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(184,150,12,0.35), transparent);
    margin-bottom: 26px;
  }

  /* QR wrapper */
  .qr-outer {
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 26px;
    position: relative;
  }
  .qr-box {
    background: #111010;
    padding: 14px;
    position: relative;
    display: inline-block;
  }
  /* small corner accents on qr */
  .qr-box::before, .qr-box::after,
  .qr-box .qc-br, .qr-box .qc-bl {
    content: ''; position: absolute;
    width: 14px; height: 14px;
    border-color: #b8960c; border-style: solid;
  }
  .qr-box::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .qr-box::after  { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .qr-box .qc-br  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
  .qr-box .qc-bl  { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }

  #qrcode canvas { display: block; filter: invert(1) sepia(1) saturate(3) hue-rotate(5deg) brightness(0.88); }

  /* account details */
  .acct-block { margin-bottom: 26px; }
  .acct-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid rgba(184,150,12,0.08);
  }
  .acct-row:last-child { border-bottom: none; }
  .acct-label {
    font-size: 7px; letter-spacing: 2.5px; text-transform: uppercase;
    color: rgba(200,196,188,0.4); font-weight: 500;
  }
  .acct-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px; color: #f5f0ea; font-weight: 400; letter-spacing: 0.3px;
  }
  .acct-value.mono {
    font-family: 'Montserrat', monospace; font-size: 12px;
    letter-spacing: 2px; color: #b8960c; font-weight: 500;
  }

  /* bottom */
  .bottom {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 18px;
    border-top: 1px solid rgba(184,150,12,0.1);
  }
  .bottom-left { display: flex; flex-direction: column; gap: 3px; }
  .scan-label {
    font-size: 7px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(200,196,188,0.35); font-weight: 500;
  }
  .siddhartha-logo {
    display: flex; align-items: center; gap: 7px;
  }
  .logo-diamond {
    width: 18px; height: 18px;
    background: #b8960c;
    transform: rotate(45deg);
    flex-shrink: 0;
    position: relative;
  }
  .logo-diamond::after {
    content: 'S';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #111010; font-family: 'Cormorant Garamond', serif;
    font-size: 11px; font-weight: 600;
    transform: rotate(-45deg);
    font-style: italic;
  }
  .logo-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px; color: #f5f0ea; font-weight: 400; letter-spacing: 0.3px;
  }
  .logo-text span { color: #b8960c; }

  /* print / share note */
  .share-note {
    text-align: center; margin-top: 20px;
    font-size: 7px; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(200,196,188,0.25);
  }

  /* print button */
  .print-btn {
    display: block; width: 100%; margin-top: 28px;
    padding: 12px; background: transparent;
    border: 1px solid rgba(184,150,12,0.3);
    color: #b8960c; font-family: 'Montserrat', sans-serif;
    font-size: 8px; letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer; transition: all 0.3s; font-weight: 500;
  }
  .print-btn:hover { background: rgba(184,150,12,0.08); border-color: #b8960c; }

  @media print {
    body { background: #111010; padding: 0; }
    .print-btn { display: none; }
    .card { box-shadow: none; }
  }
</style>
</head>
<body>

<div style="display:flex;flex-direction:column;align-items:center;">
  <div class="card">
    <div class="noise"></div>
    <div class="corner-br"></div>
    <div class="corner-bl"></div>

    <div class="inner">
      <div class="tag">Bank Payment · Nepal</div>

      <div class="name">Biplop <em>Maharjan</em></div>
      <div class="bank-line">Siddhartha Gen-Z Saving Account</div>

      <div class="divider"></div>

      <div class="qr-outer">
        <div class="qr-box">
          <div class="qc-br"></div>
          <div class="qc-bl"></div>
          <div id="qrcode"></div>
        </div>
      </div>

      <div class="acct-block">
        <div class="acct-row">
          <span class="acct-label">Account No.</span>
          <span class="acct-value mono">5551 0583 765</span>
        </div>
        <div class="acct-row">
          <span class="acct-label">Bank</span>
          <span class="acct-value">Siddhartha Bank</span>
        </div>
        <div class="acct-row">
          <span class="acct-label">Account Type</span>
          <span class="acct-value">Gen-Z Saving</span>
        </div>
      </div>

      <div class="bottom">
        <div class="bottom-left">
          <div class="scan-label">Scan to pay</div>
          <div class="siddhartha-logo">
            <div class="logo-diamond"></div>
            <div class="logo-text">Siddhartha<span>Bank</span></div>
          </div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:7px;letter-spacing:2px;text-transform:uppercase;color:rgba(200,196,188,0.3);margin-bottom:3px;">Primary</div>
          <div style="width:28px;height:1px;background:rgba(184,150,12,0.4);margin-left:auto;"></div>
        </div>
      </div>

      <div class="share-note">Full Name · Bank Name · Account Number</div>
    </div>
  </div>

  <button class="print-btn" onclick="window.print()" style="width:340px;margin-top:12px;">🖨️ &nbsp; Print / Save as Image</button>
</div>

<script>
  new QRCode(document.getElementById('qrcode'), {
    // The QR encodes the same bank payment data as the original
    text: 'BIPLOP MAHARJAN|SIDDHARTHA BANK|55510583765',
    width: 220,
    height: 220,
    colorDark: '#b8960c',
    colorLight: '#111010',
    correctLevel: QRCode.CorrectLevel.H,
  });
</script>
</body>
</html>
